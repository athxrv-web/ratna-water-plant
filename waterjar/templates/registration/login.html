{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-800 via-gray-900 to-blue-900 px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 mb-4">
                <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Ratna Water Plant</h1>
            <p class="text-gray-400 text-sm mt-1">Staff & Delivery Management</p>
        </div>
        <div class="bg-white rounded-2xl shadow-xl p-6">
            {% if messages %}{% for m in messages %}<div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-50 text-red-700 border border-red-200">{{ m }}</div>{% endfor %}{% endif %}
            <form method="post" class="space-y-4">{% csrf_token %}
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Username</label><input type="text" name="username" required autofocus class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter username"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" name="password" required class="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Enter password"></div>
                <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm">Sign In</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

<td class="px-5 py-3 text-gray-600">{{ d.staff.get_full_name|default:d.staff.username }}</td>
                    <td class="px-5 py-3 text-gray-600">{{ d.date|date:"d M Y" }}</td>
                    <td class="px-5 py-3 text-gray-800">{{ d.jar_count }}</td>
                    <td class="px-5 py-3 font-medium text-gray-800">₹{{ d.amount }}</td>
                    <td class="px-5 py-3">
                        {% if d.payment_status == 'paid' %}
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Paid</span>
                        {% else %}
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">Pending</span>
                        {% endif %}
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="6" class="px-5 py-10 text-center text-gray-400">No deliveries recorded yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

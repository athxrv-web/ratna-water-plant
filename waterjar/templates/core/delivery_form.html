{% extends "base.html" %}
{% block title %}New Delivery{% endblock %}
{% block content %}
<div class="max-w-xl"><h2 class="text-2xl font-bold mb-6">Record Delivery</h2>
<div class="bg-white rounded-xl border p-6"><form method="post" class="space-y-5">{% csrf_token %}{% for field in form %}<div><label class="block text-sm font-medium text-gray-700 mb-1.5">{{ field.label }}{% if field.field.required %}<span class="text-red-500">*</span>{% endif %}</label>{{ field }}{% for e in field.errors %}<p class="mt-1 text-xs text-red-600">{{ e }}</p>{% endfor %}</div>{% endfor %}
<div id="preview" class="hidden p-4 bg-blue-50 rounded-lg border border-blue-200"><span class="text-sm text-blue-700">Amount: </span><span id="amt" class="text-xl font-bold text-blue-800">₹0</span></div>
<div class="flex gap-3 pt-3"><button type="submit" class="px-6 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">Save Delivery</button><a href="{% url 'staff_delivery_list' %}" class="px-6 py-2.5 bg-white border text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50">Cancel</a></div></form></div></div>
<script>
const P={{% for c in form.fields.customer.queryset %}"{{c.pk}}":{{c.jar_price}},{% endfor %}};
const ce=document.getElementById('id_customer'),je=document.getElementById('id_jar_count');
function calc(){const c=ce.value,j=parseInt(je.value)||0;if(c&&j>0&&P[c]){document.getElementById('amt').textContent='₹'+(P[c]*j).toFixed(2);document.getElementById('preview').classList.remove('hidden')}else{document.getElementById('preview').classList.add('hidden')}}
ce.addEventListener('change',calc);je.addEventListener('input',calc);
</script>
{% endblock %}

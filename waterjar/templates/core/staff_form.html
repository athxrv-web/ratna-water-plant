{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-xl"><h2 class="text-2xl font-bold mb-6">{{ title }}</h2>
<div class="bg-white rounded-xl border p-6"><form method="post" class="space-y-5">{% csrf_token %}{% for field in form %}<div><label class="block text-sm font-medium text-gray-700 mb-1.5">{{ field.label }}{% if field.field.required %}<span class="text-red-500">*</span>{% endif %}</label>{{ field }}{% if field.help_text %}<p class="mt-1 text-xs text-gray-400">{{ field.help_text }}</p>{% endif %}{% for e in field.errors %}<p class="mt-1 text-xs text-red-600">{{ e }}</p>{% endfor %}</div>{% endfor %}
<div class="flex gap-3 pt-3"><button type="submit" class="px-6 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700">Save</button><a href="{% url 'staff_list' %}" class="px-6 py-2.5 bg-white border text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-50">Cancel</a></div></form></div></div>
{% endblock %}

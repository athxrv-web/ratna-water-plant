<!-- User + Logout -->
        <div class="px-4 py-4 border-t border-white/10">
            <div class="flex items-center justify-between">
                <div class="min-w-0">
                    <p class="text-sm font-medium text-white truncate">{{ user.get_full_name|default:user.username }}</p>
                    <p class="text-xs text-gray-400 capitalize">{{ user.role }}</p>
                </div>
                <a href="{% url 'logout' %}" title="Logout"
                   class="p-2 rounded-lg hover:bg-white/10 text-gray-400 hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </a>
            </div>
        </div>
    </aside>

    <!-- ======================= MAIN CONTENT ======================= -->
    <div class="flex-1 md:ml-64">

        <!-- Mobile top bar -->
        <header class="md:hidden sticky top-0 z-20 bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-gray-100">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <span class="font-semibold text-gray-800">Ratna Water Plant</span>
            <a href="{% url 'logout' %}" class="p-2 rounded-lg hover:bg-gray-100 text-gray-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
            </a>
        </header>

        <!-- Page body -->
        <main class="p-4 sm:p-6 lg:p-8">
            {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                <div class="flex items-center gap-2 px-4 py-3 rounded-lg text-sm
                    {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
                    {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
                    {% elif message.tags == 'info' %}bg-blue-50 text-blue-800 border border-blue-200
                    {% else %}bg-gray-50 text-gray-800 border border-gray-200{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Mobile overlay -->
<div id="overlay" class="hidden fixed inset-0 z-20 bg-black/50 md:hidden" onclick="toggleSidebar()"></div>
<script>
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('-translate-x-full');
    document.getElementById('overlay').classList.toggle('hidden');
}
</script>

{% else %}
    {% block auth_content %}{% endblock %}
{% endif %}

</body>
</html>
